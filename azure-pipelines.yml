trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: storekeeper-backend-secrets

stages:
  # ─────────────────────────────────────────────
  # Stage 1 : CI  (lint + test + audit)
  # ─────────────────────────────────────────────
  - stage: CI
    displayName: 'CI — Lint, Test, Audit'
    jobs:
      - job: ci
        displayName: 'Node.js CI'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: 'Setup Node.js 22'
            inputs:
              versionSpec: '22.x'

          - script: npm ci --ignore-scripts
            workingDirectory: '$(Build.SourcesDirectory)'
            displayName: 'npm ci (sans scripts natifs)'

          - script: node -e "require('fs').readdirSync('.').filter(f=>f.endsWith('.js')).forEach(f=>{try{require('child_process').execSync('node --check '+f)}catch(e){process.exit(1)}})"
            workingDirectory: '$(Build.SourcesDirectory)'
            displayName: 'Vérification syntaxe JS'

          - script: npm test
            workingDirectory: '$(Build.SourcesDirectory)'
            displayName: 'Jest — tests unitaires'

          - script: npm audit --audit-level=high
            workingDirectory: '$(Build.SourcesDirectory)'
            displayName: 'Audit sécurité (bloquant sur high/critical)'
            continueOnError: false

  # ─────────────────────────────────────────────
  # Stage 2 : Deploy (uniquement sur main)
  # ─────────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy — Agent self-hosted'
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: deploy
        displayName: 'Déploiement production'
        pool:
          name: storekeeper
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    git config --global --add safe.directory $(DEPLOY_PATH)
                    cd $(DEPLOY_PATH)
                    
                    git -c http.extraHeader="Authorization: Basic $(GIT_PAT_B64)" pull origin main
                    
                    REM Safe stop (no failure if not exists)
                    pm2 describe storekeeper-api >nul 2>&1 && pm2 stop storekeeper-api
                    
                    npm ci --omit=dev
                    
                    REM Restart or start safely
                    pm2 describe storekeeper-api >nul 2>&1 && pm2 restart storekeeper-api || pm2 start app.js --name storekeeper-api
                    
                    pm2 save
                    
                    echo "Déploiement terminé"
                  displayName: 'Deploy — git pull + pm2 restart'
