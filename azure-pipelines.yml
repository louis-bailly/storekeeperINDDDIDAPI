trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: storekeeper-backend-secrets

stages:
  # ─────────────────────────────────────────────
  # Stage 1 : CI
  # ─────────────────────────────────────────────
  - stage: CI
    displayName: 'CI — Lint, Test, Audit'
    jobs:
      - job: ci
        displayName: 'Node.js CI'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: 'Setup Node.js 22'
            inputs:
              versionSpec: '22.x'

          - script: npm ci --ignore-scripts
            workingDirectory: '$(Build.SourcesDirectory)'
            displayName: 'npm ci (sans scripts natifs)'

          - script: node -e "require('fs').readdirSync('.').filter(f=>f.endsWith('.js')).forEach(f=>{try{require('child_process').execSync('node --check '+f)}catch(e){process.exit(1)}})"
            workingDirectory: '$(Build.SourcesDirectory)'
            displayName: 'Vérification syntaxe JS'

          - script: npm test
            workingDirectory: '$(Build.SourcesDirectory)'
            displayName: 'Jest — tests unitaires'

          - script: npm audit --audit-level=high
            workingDirectory: '$(Build.SourcesDirectory)'
            displayName: 'Audit sécurité (bloquant sur high/critical)'

  # ─────────────────────────────────────────────
  # Stage 2 : Deploy
  # ─────────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy — Agent self-hosted'
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: deploy
        displayName: 'Déploiement production'
        pool:
          name: storekeeper
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo ===== DEPLOY START =====
                    git config --global --add safe.directory $(DEPLOY_PATH)
                    cd $(DEPLOY_PATH)
                    echo ===== GIT SYNC =====
                    git -c http.extraHeader="Authorization: Basic $(GIT_PAT_B64)" fetch origin main
                    git reset --hard origin/main
                    git clean -fd
                    echo ===== INSTALL =====
                    npm install --omit=dev
                    echo ===== INSTALL DONE =====
                  displayName: 'Deploy — git sync + npm install'

                - script: |
                    echo ===== PM2 =====
                    echo DEPLOY_PATH=$(DEPLOY_PATH)
                    echo PM2_HOME=%PM2_HOME%
                    cd $(DEPLOY_PATH)
                    echo cd OK
                    "C:\Program Files\nodejs\pm2.cmd" describe storekeeper-api
                    echo describe exit code: %ERRORLEVEL%
                    echo ===== DEPLOY DONE =====
                  displayName: 'Deploy — pm2 reload'
                  continueOnError: true